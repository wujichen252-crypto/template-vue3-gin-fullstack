name: CI Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ vars.PROJECT_FRONTEND_DIR || './frontend' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || '20' }}
          cache: 'npm'
          cache-dependency-path: '${{ vars.PROJECT_FRONTEND_DIR || ''./frontend'' }}/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ vars.PROJECT_BACKEND_DIR || './backend' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ vars.GO_VERSION || '1.22' }}
          cache: true
          cache-dependency-path: '${{ vars.PROJECT_BACKEND_DIR || ''./backend'' }}/go.sum'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-s -w" -o app ${{ vars.PROJECT_BACKEND_ENTRY || './cmd/main.go' }}
